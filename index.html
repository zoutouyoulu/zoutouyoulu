<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>走投有路 | 与 AI 同行，让投资有路</title>
    <meta name="description" content="走投有路，一个 AI + 投资的个人 IP。用 AI 武装头脑，让投资少走弯路。拆解研报、过滤噪音、寻找确定性。">
    <meta name="keywords" content="走投有路, AI, 投资, 人工智能, 投资分析, zoutouyoulu">
    <meta property="og:title" content="走投有路 | ZoutouYouLu">
    <meta property="og:description" content="用 AI 武装头脑，让投资少走弯路">
    <meta property="og:image" content="https://zoutouyoulu.com/og-image.jpg">
    <meta property="og:url" content="https://zoutouyoulu.com">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>↗️</text></svg>">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #f59e0b;
            --bg: #070b1a;
            --text: #ffffff;
            --glass: rgba(59, 130, 246, 0.05);
            --glass-border: rgba(59, 130, 246, 0.12);
            --subtext: #94a3b8;
            --dim: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(245,158,11,0.05) 0%, transparent 50%);
            color: var(--text);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 60px 20px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Logo ── */
        .logo-wrapper {
            position: relative;
            margin-bottom: 28px;
            cursor: pointer;
        }
        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--primary), var(--accent), var(--primary));
            filter: blur(20px);
            animation: spin 4s linear infinite;
            opacity: 0.35;
        }
        .logo-core {
            position: relative;
            width: 90px; height: 90px;
            background: #0a0f1e;
            border-radius: 50%;
            border: 2px solid rgba(59,130,246,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px rgba(59,130,246,0.1);
            overflow: hidden;
        }
        .logo-core img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #f0f0f0, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slogan {
            font-size: 14px;
            color: var(--subtext);
            height: 22px;
            margin-bottom: 28px;
            font-family: 'Courier New', Courier, monospace;
        }
        .cursor {
            display: inline-block;
            width: 2px; height: 14px;
            background-color: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        /* ── Bio Card ── */
        .bio-card {
            width: 100%;
            background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(245,158,11,0.03));
            border: 1px solid rgba(59,130,246,0.12);
            border-radius: 18px;
            padding: 22px 24px;
            margin-bottom: 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.04);
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .bio-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            animation: flow 3s infinite;
        }
        .bio-text {
            font-size: 14px;
            line-height: 1.9;
            color: var(--subtext);
        }
        .bio-text strong { color: #e8e8e8; }
        .tags {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(59,130,246,0.08);
            color: var(--subtext);
            border: 1px solid rgba(59,130,246,0.12);
        }

        /* ── Links ── */
        .section-label {
            font-size: 11px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
            text-align: center;
            width: 100%;
        }
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            color: #d0d0d0;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s ease;
            overflow: hidden;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn svg {
            width: 18px; height: 18px;
            fill: currentColor;
            transition: transform 0.25s;
        }
        .btn:hover svg { transform: scale(1.15); }
        .btn-wechat:hover { border-color: #07C160; color: #07C160; box-shadow: 0 0 20px rgba(7,193,96,0.15); }
        .btn-douyin:hover { border-color: #FE2C55; color: #FE2C55; box-shadow: 0 0 20px rgba(254,44,85,0.15); }
        .btn-x:hover { border-color: #1DA1F2; color: #1DA1F2; box-shadow: 0 0 20px rgba(29,161,242,0.15); }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #334155;
        }

        /* ── Animations ── */
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes flow {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .fade-in {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeInUp 0.6s forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">

        <!-- Logo -->
        <div class="logo-wrapper fade-in">
            <div class="logo-glow"></div>
            <div class="logo-core">
                <img src="logo_zoutouyoulu.svg"
                     alt="走投有路 Logo"
                     onerror="this.style.display='none';this.parentElement.innerHTML=`<svg class='logo-icon' viewBox='0 0 400 400' fill='none'><path d='M100 300 L200 150 L320 60' stroke='#3b82f6' stroke-width='28' stroke-linecap='round' stroke-linejoin='round'/><circle cx='320' cy='60' r='16' fill='#f59e0b'/></svg>`">
            </div>
        </div>

        <h1 class="fade-in delay-1">走投有路</h1>

        <div class="slogan fade-in delay-1">
            <span id="typewriter"></span><span class="cursor"></span>
        </div>

        <!-- Bio -->
        <div class="bio-card fade-in delay-2">
            <p class="bio-text">
                👋 你好，这里是 <strong>走投有路</strong>。<br><br>
                我不做高高在上的"股神"，只做你投资路上的<strong>AI 探路者</strong>。<br><br>
                在这里，我们用 AI 拆解研报、过滤噪音、寻找确定性。
            </p>
            <div class="tags">
                <span class="tag">🤖 AI 赋能</span>
                <span class="tag">📈 投资逻辑</span>
                <span class="tag">🧠 认知进化</span>
            </div>
        </div>

        <!-- Featured -->
        <div class="section-label fade-in delay-3">精选内容</div>
        <div class="links fade-in delay-3" style="margin-bottom:28px;">
            <a href="/tutorials/" class="btn" style="border-color: rgba(245,158,11,0.15);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                📖 AI 教程 — ComfyUI 文生图模型对比
            </a>
        </div>

        <!-- Platform Links -->
        <div class="section-label fade-in delay-3">关注我</div>
        <div class="links fade-in delay-3">
            <a href="#" class="btn btn-wechat">
                <svg viewBox="0 0 24 24"><path d="M8.5 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm.5 4c-1.7 0-3.5-1.5-3.5-3.5s1.5-3.5 3.5-3.5 3.5 1.5 3.5 3.5-1.8 3.5-3.5 3.5zM22 12c0 4.4-4.5 8-10 8-1.3 0-2.5-.2-3.7-.6L4 20.5l1.3-3.2C2.4 16 1 14.2 1 12 1 7.6 5.5 4 11 4s10 3.6 10 8h-1z"/></svg>
                关注公众号
            </a>
            <a href="#" class="btn btn-douyin">
                <svg viewBox="0 0 24 24"><path d="M19 8h-2v7.2c0 1.6-1.3 2.8-2.8 2.8s-2.8-1.2-2.8-2.8c0-1.6 1.3-2.8 2.8-2.8.6 0 1.1.1 1.5.5V9.6c-.5-.2-1-.3-1.5-.3-3 0-5.5 2.5-5.5 5.5s2.5 5.5 5.5 5.5 5.5-2.5 5.5-5.5V8h-2z"/></svg>
                关注抖音
            </a>
            <a href="/tutorials/" class="btn" style="border-color: rgba(245,158,11,0.08);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                📖 教程收藏
            </a>
            <a href="#" class="btn btn-x">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                关注 X (Twitter)
            </a>
        </div>

        <div class="footer fade-in delay-3">
            © 2026 走投有路 · 投资探索计划
        </div>

    </div>

    <script>
        const text = "与 AI 同行，让投资有路";
        const typeEl = document.getElementById('typewriter');
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                typeEl.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        setTimeout(typeWriter, 600);

        // Stars
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.6 + 0.2;
                this.speed = Math.random() * 0.02 + 0.005;
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.color = Math.random() > 0.3 ? '#3b82f6' : '#f59e0b';
            }
            update() {
                this.alpha += this.speed * this.direction;
                if (this.alpha > 0.8 || this.alpha < 0.1) this.direction *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initStars() {
            stars = [];
            const count = Math.min(Math.floor(window.innerWidth / 10), 80);
            for (let i = 0; i < count; i++) stars.push(new Star());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initStars(); });
        resize();
        initStars();
        animate();
    </script>
</body>
</html>
