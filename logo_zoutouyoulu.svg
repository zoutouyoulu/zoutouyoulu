<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="blueGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="#0f172a" rx="80"/>
  
  <!-- Compass Base -->
  <circle cx="250" cy="250" r="160" fill="none" stroke="url(#blueGold)" stroke-width="8" opacity="0.3"/>
  <circle cx="250" cy="250" r="120" fill="none" stroke="url(#blueGold)" stroke-width="4" opacity="0.5"/>
  
  <!-- Compass Needle (Upward) -->
  <path d="M250 90 L280 250 L250 290 L220 250 Z" fill="url(#blueGold)" filter="url(#glow)"/>
  
  <!-- Upward Chart Line -->
  <path d="M140 380 L200 300 L260 330 L340 160" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Chart Points -->
  <circle cx="140" cy="380" r="12" fill="#3b82f6"/>
  <circle cx="200" cy="300" r="12" fill="#3b82f6"/>
  <circle cx="260" cy="330" r="12" fill="#3b82f6"/>
  <circle cx="340" cy="160" r="16" fill="#f59e0b" stroke="#fff" stroke-width="4"/>
</svg>